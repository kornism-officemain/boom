<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>boom</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="stage">
  <canvas id="game" width="960" height="600"></canvas>

  <!-- HUD (플레이 중): [레벨·시간] [점수(중앙 대형)] [라이프] -->
  <div id="hud" class="hidden">
    <div id="hud-left">
      <span id="hud-time">🕐 0s</span>
      <span id="hud-boost" class="hidden">×2 BOOST</span>
    </div>
    <div id="hud-score-wrap">
      <div id="hud-score-label">SCORE</div>
      <div id="hud-score">0</div>
    </div>
    <div id="hud-lives">♥♥♥</div>
    <div id="levelup-banner" class="hidden"></div>
  </div>

  <!-- 첫 화면: 좌측 시작 / 우측 리더보드 -->
  <div id="screen-menu" class="screen">
    <div class="menu-row">
      <div class="menu-main">
        <h1>boom</h1>
        <p class="tagline"><span class="good">푸른 건 먹고</span>, <span class="bad">붉은 건 피한다</span>. 그게 전부다.</p>
        <p class="tagline sub">심해의 아기 발광어 — 목숨 3개, 얼마나 오래 먹고 살아남는가.</p>
        <input id="name-input" maxlength="12" placeholder="이름 입력" autocomplete="off">
        <button id="btn-start" class="primary">START</button>
        <button id="btn-howto">자세히 보기 <span id="howto-badge" class="badge">!</span></button>
        <p class="hint">마우스 따라가기 또는 방향키/WASD · M: 사운드</p>
        <p class="hint" id="dex-progress"></p>
      </div>
      <div class="menu-board">
        <div class="card-label">🏆 리더보드 TOP 15 <span class="live-dot"></span></div>
        <ol id="menu-board-list"><li class="dim">불러오는 중…</li></ol>
        <div id="menu-board-target"></div>
        <div id="menu-board-meta"></div>
      </div>
    </div>
  </div>

  <!-- 자세히 보기 모달 (초간단) -->
  <div id="modal-howto" class="modal hidden">
    <div class="modal-box">
      <div id="howto-content"></div>
      <button id="btn-howto-close" class="primary">알았다, 시작하자</button>
    </div>
  </div>

  <!-- 결과 화면: [내 기록] [리더보드] + [한 판 더] 3그룹 -->
  <div id="screen-result" class="screen hidden">
    <div class="result-grid">
      <div class="result-card" id="card-me">
        <div class="card-label">내 기록</div>
        <h2 id="result-cause"></h2>
        <div id="result-score" class="big-score">0</div>
        <div id="result-best"></div>
        <div id="result-rank"></div>
        <div id="result-stats"></div>
        <div id="result-discover"></div>
      </div>
      <div class="result-card" id="card-board">
        <div class="card-label">리더보드</div>
        <div class="board-tabs">
          <button data-board="score" class="tab selected">점수</button>
          <button data-board="survival" class="tab">생존</button>
          <button data-board="combo" class="tab">콤보</button>
          <button data-board="nearmiss" class="tab">니어미스</button>
        </div>
        <ol id="board-list"></ol>
      </div>
    </div>
    <button id="btn-retry" class="primary retry">한 판 더 (Space)</button>
  </div>
</div>
<script type="module" src="js/main.js"></script>
</body>
</html>
